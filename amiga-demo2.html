<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMIGA 500 - DEMO EVOLVED</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 
         * SECTION 1: THE AMIGA AESTHETIC 
         */
        body {
            margin: 0;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive; /* The classic pixel font */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            cursor: pointer;
        }

        /* 
         * SECTION 2: THE COPPER BARS (RASTER BARS)
         */
        .raster-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.3;
            background: repeating-linear-gradient(
                0deg,
                transparent 0%,
                transparent 40%,
                rgba(255, 0, 0, 0.5) 42%,
                rgba(255, 255, 0, 0.8) 45%,
                rgba(255, 255, 255, 1) 50%,
                rgba(255, 255, 0, 0.8) 55%,
                rgba(255, 0, 0, 0.5) 58%,
                transparent 60%,
                transparent 100%
            );
            background-size: 100% 200vh; /* Twice the height to scroll continuously */
            animation: copper-move 4s linear infinite;
        }
        @keyframes copper-move {
            0% { background-position: 0 0; }
            100% { background-position: 0 200vh; }
        }

        /* 
         * SECTION 3: THE STARFIELD
         */
        .stars {
            position: absolute;
            width: 2px; height: 2px;
            background: transparent;
            z-index: 0;
            box-shadow: 
                10vw 10vh #fff, 20vw 80vh #fff, 30vw 30vh #fff, 40vw 50vh #fff,
                50vw 90vh #fff, 60vw 20vh #fff, 70vw 60vh #fff, 80vw 10vh #fff,
                90vw 40vh #fff, 15vw 75vh #fff, 85vw 85vh #fff;
            animation: star-scroll 10s linear infinite;
        }
        .stars-2 {
            width: 3px; height: 3px;
            box-shadow: 
                15vw 15vh #888, 25vw 85vh #888, 35vw 35vh #888, 45vw 55vh #888,
                55vw 95vh #888, 65vw 25vh #888, 75vw 65vh #888, 85vw 15vh #888;
            animation: star-scroll 20s linear infinite;
        }
        @keyframes star-scroll {
            from { transform: translateY(0px); }
            to { transform: translateY(-100vh); }
        }

        /* 
         * SECTION 4: THE BOUNCING LOGO
         */
        .logo-container {
            z-index: 10;
            perspective: 500px;
            margin-bottom: 50px;
        }
        .logo {
            font-size: clamp(2rem, 8vw, 6rem);
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 0%, #bbb 50%, #444 51%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-box-reflect: below -10px linear-gradient(transparent, rgba(255,255,255,0.3));
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: rotateX(10deg) translateY(0); }
            50% { transform: rotateX(-10deg) translateY(-20px); }
        }

        /* 
         * SECTION 5: THE SCROLLTEXT (MARQUEE)
         */
        .scroller-box {
            position: fixed;
            bottom: 10%;
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0.5);
            border-top: 2px solid #fff;
            border-bottom: 2px solid #fff;
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 20;
        }
        .scroller-text {
            white-space: nowrap;
            font-size: 1.5rem;
            color: #ff0; /* Classic Amiga Yellow */
            text-shadow: 2px 2px #f00;
            animation: scroll-left 15s linear infinite;
            padding-left: 100vw; /* Start off-screen */
        }
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-200%); }
        }
        
        /* OVERLAY AND UI */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s;
        }
        .click-msg {
            font-size: 1.2rem;
            animation: blink 0.5s steps(2, start) infinite;
        }
        @keyframes blink { to { opacity: 0; } }

        .eq-bars {
            display: flex;
            gap: 2px;
            height: 50px;
            align-items: flex-end;
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 5;
        }
        .bar {
            width: 10px;
            background: lime;
            animation: eq 0.5s ease infinite;
        }
        .bar:nth-child(odd) { animation-duration: 0.4s; background: yellow; }
        .bar:nth-child(3n) { animation-duration: 0.7s; background: red; }
        @keyframes eq { 0%, 100% { height: 5px; } 50% { height: 40px; } }

        /* 
         * SECTION 6: BOUNCING BALLS (NEW)
         */
        #ball-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            overflow: hidden;
        }
        .ball {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, #f0f, #0ff);
            will-change: transform;
            opacity: 0.7;
            filter: blur(1px);
        }
        @keyframes bounce-ball-y {
            from { transform: translateY(-10vh); }
            to { transform: translateY(110vh); }
        }
        @keyframes bounce-ball-x {
            from { transform: translateX(0vw); }
            to { transform: translateX(90vw); }
        }

        /* 
         * SECTION 7: SPACESHIP (NEW) 
         */
        #spaceship {
            position: absolute;
            top: 50%;
            left: -100px; /* Start off-screen */
            font-size: 4rem;
            z-index: 15;
            text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff;
            transform: rotate(90deg);
            opacity: 0; /* Initially hidden */
        }
        #spaceship.fly {
            opacity: 1;
            animation: fly-by 10s linear 1 forwards;
        }
        @keyframes fly-by {
            0% { left: -100px; top: 80%; }
            20% { top: 30%; }
            100% { left: 110vw; top: 20%; }
        }

        /* 
         * SECTION 8: OTHER CLEVER THINGS (NEW) 
         */
        .screen-shake {
            animation: shake 0.5s linear 2;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(5px) translateY(-5px); }
            50% { transform: translateX(-5px) translateY(5px); }
            75% { transform: translateX(5px) translateY(-5px); }
        }
        .glitch-effect {
            animation: glitch 0.2s linear infinite, bounce 2s ease-in-out infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 2px 2px #f00, -2px -2px #0ff; transform: translate(0, 0); }
            25% { text-shadow: -2px 2px #f00, 2px -2px #0ff; transform: translate(-1px, 1px); }
            50% { text-shadow: 2px -2px #f00, -2px 2px #0ff; transform: translate(1px, -1px); }
            75% { text-shadow: -2px -2px #f00, 2px 2px #0ff; transform: translate(1px, 1px); }
            100% { text-shadow: 2px 2px #f00, -2px -2px #0ff; transform: translate(0, 0); }
        }

    </style>
</head>
<body>
    <!-- VISUALS -->
    <div class="stars"></div>
    <div class="stars-2"></div>
    <div class="raster-bg"></div>
    <div class="logo-container">
        <div class="logo">EMEA-AppMod</div>
    </div>
    <div class="eq-bars" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="scroller-box">
        <div class="scroller-text">
            GREETINGS TO: GOOGLE... OPENAI... ANTHROPIC... AND YOU! *** CODE BY YOUR ASSISTANT *** PURE CSS VISUALS *** AUDIO SYNTHESIZED IN REALTIME VIA JAVASCRIPT *** DEMO STYLE NEVER DIES *** AMIGA 500 FOREVER *** PRESS RELOAD TO REBOOT *** 
        </div>
    </div>

    <!-- NEW EFFECTS CONTAINERS -->
    <div id="ball-container"></div>
    <div id="spaceship">üöÄ</div>

    <!-- CLICK TO START OVERLAY -->
    <div class="overlay" id="overlay">
        <div class="click-msg">INSERT DISK 1 (CLICK TO START)</div>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        let isPlaying = false;
        let audioCtx;

        overlay.addEventListener('click', () => {
            if(isPlaying) return;
            isPlaying = true;

            // Give user feedback and start countdown
            const clickMsg = document.querySelector('.click-msg');
            clickMsg.textContent = "LOADING...";
            clickMsg.style.animation = 'none'; // Stop blinking
            
            // Wait 5 seconds before starting the main demo
            setTimeout(() => {
                overlay.style.opacity = 0;
                setTimeout(() => overlay.remove(), 500);
                startDemo();
            }, 5000); 
        });

        // NEW function to kick off the main demo after the delay
        function startDemo() {
            // 1. Start the original audio engine
            initAudio();

            // 2. Create the bouncing balls
            createBouncingBalls(20);

            // 3. Launch the spaceship
            document.getElementById('spaceship').classList.add('fly');

            // 4. Do other clever things
            // Add screen shake
            document.body.classList.add('screen-shake');
            setTimeout(() => document.body.classList.remove('screen-shake'), 1000);

            // Add glitch effect to logo
            const logo = document.querySelector('.logo');
            logo.classList.remove('bounce');
            logo.classList.add('glitch-effect');
        }

        // NEW function to generate bouncing balls
        function createBouncingBalls(count) {
            const container = document.getElementById('ball-container');
            for (let i = 0; i < count; i++) {
                const ball = document.createElement('div');
                ball.classList.add('ball');
                
                const size = Math.random() * 40 + 10; // 10px to 50px
                const startX = Math.random() * 100; // vw
                
                ball.style.width = `${size}px`;
                ball.style.height = `${size}px`;
                ball.style.left = `${startX}vw`;
                
                // Vary animations for a chaotic, natural look
                const yDuration = Math.random() * 2 + 3; // 3s to 5s
                const xDuration = Math.random() * 5 + 8; // 8s to 13s
                const delay = Math.random() * 2;
                
                ball.style.animation = `
                    bounce-ball-y ${yDuration}s ease-in-out ${delay}s infinite alternate, 
                    bounce-ball-x ${xDuration}s linear ${delay}s infinite alternate
                `;

                container.appendChild(ball);
            }
        }

        // THE ORIGINAL AUDIO ENGINE
        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            const tempo = 125;
            const secondsPerBeat = 60 / tempo;
            const noteLength = secondsPerBeat / 4; 
            const scale = [130.81, 155.56, 174.61, 196.00, 233.08, 261.63, 311.13, 349.23, 392.00, 466.16, 523.25];
            let noteIndex = 0;

            function playNote(freq, time, type = 'square', decay = 0.1) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.1, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + decay);
                osc.start(time);
                osc.stop(time + decay);
            }

            let nextNoteTime = audioCtx.currentTime;
            function scheduler() {
                while (nextNoteTime < audioCtx.currentTime + 0.1) {
                    scheduleNote(nextNoteTime);
                    nextNoteTime += noteLength;
                }
                requestAnimationFrame(scheduler);
            }

            function scheduleNote(time) {
                if (noteIndex % 4 === 0) {
                    const bassNote = scale[Math.floor((noteIndex % 16) / 4)]; 
                    playNote(bassNote / 2, time, 'sawtooth', 0.3);
                }
                let patternIndex = noteIndex % 8; 
                let note = scale[patternIndex + (Math.floor(noteIndex/16)%2 * 2)];
                if (Math.random() > 0.9) note *= 2;
                playNote(note, time, 'square', 0.15);
                noteIndex++;
            }
            scheduler();
        }
    </script>
</body>
</html>
